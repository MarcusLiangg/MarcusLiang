<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Clinical vocabulary grounding pipeline</title>
  <desc id="desc">Light-background diagram showing how clinical phrases are extracted, normalized, embedded, matched against vocabulary stores, and converted into auditable SQL filters.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#38506a"/></marker>
    <style>
      .bg{fill:#fbfbf7}.panel{fill:#fff;stroke:#d7e2ee;stroke-width:1.5}.node{fill:#fff;stroke:#9fb3c8;stroke-width:1.5}.green{fill:#ecf8ef;stroke:#74be88}.blue{fill:#eaf4ff;stroke:#79aee8}.amber{fill:#fff6df;stroke:#d8b963}.purple{fill:#f2edff;stroke:#9b83dd}.store{fill:#1f3145;stroke:#1f3145}.storeText{fill:#fff;font-family:Arial,sans-serif;font-size:14px;font-weight:700}.line{stroke:#38506a;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke:#90a2b5;stroke-width:1.8;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}.title{fill:#1f3145;font-family:Arial,sans-serif;font-size:28px;font-weight:700}.label{fill:#1f3145;font-family:Arial,sans-serif;font-size:16px;font-weight:700}.small{fill:#42566c;font-family:Arial,sans-serif;font-size:13px;font-weight:600}.tiny{fill:#54687e;font-family:Arial,sans-serif;font-size:12px;font-weight:600}.tag{fill:#315b8d;font-family:Arial,sans-serif;font-size:12px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <rect class="panel" x="34" y="32" width="1212" height="656" rx="18"/>
  <text class="title" x="64" y="78">Clinical Vocabulary Grounding Pipeline</text>
  <text class="small" x="64" y="104">Natural-language clinical terms are grounded before SQL generation, reducing hallucinated fields and unsupported concepts.</text>

  <rect class="node blue" x="80" y="170" width="170" height="68" rx="8"/>
  <text class="label" x="120" y="198">User Query</text>
  <text class="tiny" x="104" y="218">free-text clinical request</text>
  <rect class="node" x="306" y="170" width="170" height="68" rx="8"/>
  <text class="label" x="336" y="198">Term Extractor</text>
  <text class="tiny" x="336" y="218">entities and phrases</text>
  <rect class="node amber" x="532" y="170" width="170" height="68" rx="8"/>
  <text class="label" x="560" y="198">Synonym Expand</text>
  <text class="tiny" x="566" y="218">aliases and variants</text>
  <rect class="node purple" x="758" y="170" width="170" height="68" rx="8"/>
  <text class="label" x="790" y="198">ClinicalBERT</text>
  <text class="tiny" x="792" y="218">semantic embedding</text>
  <rect class="store" x="984" y="170" width="170" height="68" rx="8"/>
  <text class="storeText" x="1032" y="198">FAISS</text>
  <text class="storeText" x="1012" y="218">nearest concepts</text>
  <path class="line" d="M250 204 H306"/><path class="line" d="M476 204 H532"/><path class="line" d="M702 204 H758"/><path class="line" d="M928 204 H984"/>

  <rect class="node green" x="174" y="338" width="190" height="72" rx="8"/>
  <text class="label" x="226" y="366">ATHENA</text>
  <text class="tiny" x="202" y="386">vocabulary metadata</text>
  <rect class="node" x="436" y="338" width="190" height="72" rx="8"/>
  <text class="label" x="470" y="366">Candidate Rank</text>
  <text class="tiny" x="464" y="386">similarity and domain fit</text>
  <rect class="node amber" x="698" y="338" width="190" height="72" rx="8"/>
  <text class="label" x="738" y="366">Concept Review</text>
  <text class="tiny" x="728" y="386">accept, reject, or clarify</text>
  <rect class="node blue" x="960" y="338" width="190" height="72" rx="8"/>
  <text class="label" x="1000" y="366">SQL Filters</text>
  <text class="tiny" x="996" y="386">auditable concept IDs</text>
  <path class="line" d="M1069 238 C1069 292 269 292 269 338"/>
  <path class="line" d="M364 374 H436"/><path class="line" d="M626 374 H698"/><path class="line" d="M888 374 H960"/>

  <rect class="panel" x="124" y="520" width="300" height="82" rx="10"/>
  <text class="tag" x="148" y="550">Fallback matching</text>
  <text class="small" x="148" y="572">Exact match, truncated phrase,</text>
  <text class="small" x="148" y="592">and domain-filtered retrieval.</text>
  <rect class="panel" x="490" y="520" width="300" height="82" rx="10"/>
  <text class="tag" x="514" y="550">Audit artifact</text>
  <text class="small" x="514" y="572">Store selected concept IDs,</text>
  <text class="small" x="514" y="592">similarity score, and rationale.</text>
  <rect class="panel" x="856" y="520" width="300" height="82" rx="10"/>
  <text class="tag" x="880" y="550">Safety benefit</text>
  <text class="small" x="880" y="572">Grounding happens before the</text>
  <text class="small" x="880" y="592">SQL agent touches the database.</text>
  <path class="dash" d="M793 410 C793 466 640 466 640 520"/>
</svg>
